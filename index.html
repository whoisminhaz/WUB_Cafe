<!DOCTYPE html>
<html>
<head>
    <title>Golden Pizza</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding-top: 20%; background-color: #f0f2f5; }
        .btn { 
            display: inline-block; 
            padding: 15px 30px; 
            font-size: 18px; 
            color: white; 
            background-color: #0866ff; 
            text-decoration: none; 
            border-radius: 8px; 
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .fallback { margin-top: 20px; font-size: 14px; }
    </style>
</head>
<body>
    <h2>Continue to Golden Pizza</h2>
    
    <a href="#" class="btn" onclick="openApp()">Open in Facebook App</a>

    <div class="fallback">
        <p>Or <a href="https://www.facebook.com/GoldenPizzaOfficial">continue in browser</a>.</p>
    </div>

    <script>
        function openApp() {
            // Android/General URI Scheme
            var appUrl = "fb://facewebmodal/f?href=https://www.facebook.com/GoldenPizzaOfficial";
            
            // Execute launch
            window.location.replace(appUrl);
        }
    </script>
</body>
</html>
